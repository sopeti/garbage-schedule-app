<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="#f0faf2"/>

  <!-- Trash bin body -->
  <rect x="282" y="420" width="460" height="420" rx="50" fill="#4a9e5c"/>
  <!-- Bin shine -->
  <rect x="310" y="448" width="80" height="180" rx="30" fill="#6abf7a" opacity="0.5"/>

  <!-- Bin lid -->
  <rect x="252" y="360" width="520" height="80" rx="40" fill="#3a8a4c"/>
  <!-- Lid handle -->
  <rect x="432" y="300" width="160" height="70" rx="35" fill="#3a8a4c"/>

  <!-- Cute face on bin -->
  <!-- Left eye (looking up-right) -->
  <ellipse cx="430" cy="590" rx="32" ry="36" fill="white"/>
  <ellipse cx="442" cy="582" rx="18" ry="20" fill="#1a1a2e"/>
  <circle cx="451" cy="575" r="7" fill="white"/>
  <!-- Right eye (looking up-right) -->
  <ellipse cx="594" cy="590" rx="32" ry="36" fill="white"/>
  <ellipse cx="606" cy="582" rx="18" ry="20" fill="#1a1a2e"/>
  <circle cx="615" cy="575" r="7" fill="white"/>

  <!-- Smile -->
  <path d="M 430 670 Q 512 730 594 670" stroke="white" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Rosy cheeks -->
  <ellipse cx="378" cy="650" rx="36" ry="24" fill="#ff9eb5" opacity="0.6"/>
  <ellipse cx="646" cy="650" rx="36" ry="24" fill="#ff9eb5" opacity="0.6"/>

  <!-- Thought bubble dots from bin head to calendar -->
  <circle cx="530" cy="375" r="8" fill="white" opacity="0.8"/>
  <circle cx="558" cy="330" r="13" fill="white" opacity="0.85"/>
  <circle cx="592" cy="282" r="18" fill="white" opacity="0.9"/>

  <!-- Mini calendar floating top right -->
  <rect x="620" y="200" width="200" height="190" rx="28" fill="white" opacity="0.95"
        filter="url(#shadow)"/>
  <!-- Calendar header -->
  <rect x="620" y="200" width="200" height="56" rx="28" fill="#4a9e5c"/>
  <rect x="620" y="228" width="200" height="28" fill="#4a9e5c"/>
  <!-- Calendar dots (days) -->
  <circle cx="665" cy="300" r="12" fill="#4a9e5c"/>
  <circle cx="720" cy="300" r="12" fill="#e2e8e2"/>
  <circle cx="775" cy="300" r="12" fill="#e2e8e2"/>
  <circle cx="665" cy="345" r="12" fill="#e2e8e2"/>
  <circle cx="720" cy="345" r="12" fill="#ff9eb5"/>
  <circle cx="775" cy="345" r="12" fill="#e2e8e2"/>

  <!-- Cherry blossoms -->
  <!-- Blossom 1 top left -->
  <g transform="translate(160, 180) rotate(15)">
    <ellipse cx="0" cy="-22" rx="14" ry="20" fill="#ffb7c5"/>
    <ellipse cx="21" cy="-7" rx="14" ry="20" fill="#ffb7c5" transform="rotate(72 0 0)"/>
    <ellipse cx="13" cy="18" rx="14" ry="20" fill="#ffb7c5" transform="rotate(144 0 0)"/>
    <ellipse cx="-13" cy="18" rx="14" ry="20" fill="#ffb7c5" transform="rotate(216 0 0)"/>
    <ellipse cx="-21" cy="-7" rx="14" ry="20" fill="#ffb7c5" transform="rotate(288 0 0)"/>
    <circle cx="0" cy="0" r="10" fill="#ffe4ec"/>
  </g>

  <!-- Blossom 2 top right small -->
  <g transform="translate(870, 140) rotate(-10)">
    <ellipse cx="0" cy="-16" rx="10" ry="14" fill="#ffb7c5"/>
    <ellipse cx="15" cy="-5" rx="10" ry="14" fill="#ffb7c5" transform="rotate(72 0 0)"/>
    <ellipse cx="9" cy="13" rx="10" ry="14" fill="#ffb7c5" transform="rotate(144 0 0)"/>
    <ellipse cx="-9" cy="13" rx="10" ry="14" fill="#ffb7c5" transform="rotate(216 0 0)"/>
    <ellipse cx="-15" cy="-5" rx="10" ry="14" fill="#ffb7c5" transform="rotate(288 0 0)"/>
    <circle cx="0" cy="0" r="7" fill="#ffe4ec"/>
  </g>

  <!-- Blossom 3 bottom left -->
  <g transform="translate(140, 820) rotate(5)">
    <ellipse cx="0" cy="-14" rx="9" ry="13" fill="#ffb7c5" opacity="0.8"/>
    <ellipse cx="13" cy="-4" rx="9" ry="13" fill="#ffb7c5" opacity="0.8" transform="rotate(72 0 0)"/>
    <ellipse cx="8" cy="11" rx="9" ry="13" fill="#ffb7c5" opacity="0.8" transform="rotate(144 0 0)"/>
    <ellipse cx="-8" cy="11" rx="9" ry="13" fill="#ffb7c5" opacity="0.8" transform="rotate(216 0 0)"/>
    <ellipse cx="-13" cy="-4" rx="9" ry="13" fill="#ffb7c5" opacity="0.8" transform="rotate(288 0 0)"/>
    <circle cx="0" cy="0" r="6" fill="#ffe4ec"/>
  </g>

  <!-- Sparkles -->
  <text x="200" y="420" font-size="48" opacity="0.7">✨</text>
  <text x="800" y="780" font-size="36" opacity="0.6">⭐</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000022"/>
    </filter>
  </defs>
</svg>
